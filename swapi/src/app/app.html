
<div class="hero bg-base-200 min-h-1/4">
  <div class="hero-content flex-col lg:flex-row">
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/0/02/George_Lucas_1986_%28cropped%29.jpg"
      class="max-w-sm rounded-lg shadow-2xl"
    />
    <div>
      <h1 class="text-5xl font-bold">SWAPI</h1>
      <p class="py-6">
        Here are some listings from the Star Wars movies.
      </p>
      <button class="btn btn-primary" (click)="loadData()">Query Data</button>
    </div>
  </div>
</div>

<app-ui-list [title]="listNames[0]" [myDataList]="films$ | async"/>
<app-ui-list [title]="listNames[1]" [myDataList]="planets$ | async"/>
<app-ui-list [title]="listNames[2]" [myDataList]="starships$ | async"/>

<router-outlet />
